{% extends "base.html" %}
{% load static %}

{% block title %}Chấm trực tiếp (Live Camera){% endblock %}

{% block extra_css %}
<style>
    .live-container {
        max-width: 960px;
        margin: 0 auto;
        padding: var(--space-3);
    }
    .live-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-bottom: var(--space-3);
    }
    .live-header h1 {
        font-size: 1.5rem;
        margin: 0;
    }
    .live-controls {
        display: flex;
        gap: var(--space-2);
        align-items: center;
    }
    .live-video-wrap {
        position: relative;
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        width: 100%;
        max-width: calc(85vh * 9 / 16);
        aspect-ratio: 9 / 16;
        max-height: 85vh;
        margin: 0 auto;
    }

    /* ── Fullscreen mode ── */
    .live-container.is-fullscreen {
        position: fixed;
        inset: 0;
        max-width: none;
        padding: 0;
        margin: 0;
        z-index: 9999;
        background: #000;
        display: flex;
        flex-direction: column;
    }
    .live-container.is-fullscreen .live-header {
        display: none;
    }
    .live-container.is-fullscreen .live-video-wrap {
        flex: 1;
        max-height: none;
        max-width: none;
        aspect-ratio: auto;
        border-radius: 0;
        width: 100vw;
        height: 100vh;
    }
    .live-container.is-fullscreen .live-result-panel {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        max-height: 55vh;
        overflow-y: auto;
        border-radius: 16px 16px 0 0;
        z-index: 10000;
        background: rgba(15,15,15,0.95);
        color: #fff;
        backdrop-filter: blur(12px);
        padding: var(--space-3);
        animation: slide-up 0.3s ease-out;
    }
    .live-container.is-fullscreen .live-result-panel .result-score {
        color: #fff;
    }
    .live-container.is-fullscreen .live-result-panel .result-info-item {
        background: rgba(255,255,255,0.1);
        border-color: rgba(255,255,255,0.15);
    }
    .live-container.is-fullscreen .live-result-panel .result-info-item .label {
        color: rgba(255,255,255,0.6);
    }
    .live-container.is-fullscreen .live-result-panel .result-info-item .value {
        color: #fff;
    }
    .live-container.is-fullscreen .live-result-panel .live-answers {
        color: rgba(255,255,255,0.85);
    }
    @keyframes slide-up {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
    }
    /* Fullscreen top bar */
    .fs-topbar {
        display: none;
        position: absolute;
        top: 0; left: 0; right: 0;
        padding: 12px 16px;
        z-index: 25;
        background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        align-items: center;
        justify-content: space-between;
    }
    .live-container.is-fullscreen .fs-topbar {
        display: flex;
    }
    .fs-topbar button, .fs-topbar select {
        background: rgba(255,255,255,0.15);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 0.8rem;
        backdrop-filter: blur(8px);
    }
    .fs-topbar .fs-close {
        width: 36px; height: 36px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        padding: 0;
        font-size: 1.2rem;
    }
    .live-video-wrap video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }
    .live-overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }
    .live-corner-status {
        position: absolute;
        bottom: 88px;
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        backdrop-filter: blur(8px);
        pointer-events: none;
        white-space: nowrap;
        transition: all 0.3s;
        z-index: 15;
    }
    .corner-status-searching {
        background: rgba(255,255,255,0.2);
        color: rgba(255,255,255,0.7);
    }
    .corner-status-partial {
        background: rgba(251,191,36,0.7);
        color: #fff;
    }
    .corner-status-found {
        background: rgba(34,197,94,0.85);
        color: #fff;
        animation: pulse-found 1.5s infinite;
    }
    @keyframes pulse-found {
        0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
        50% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    }
    .live-status {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
    }
    .live-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        backdrop-filter: blur(8px);
    }
    .badge-idle { background: rgba(255,255,255,0.2); color: #fff; }
    .badge-scanning { background: rgba(59,130,246,0.8); color: #fff; }
    .badge-success { background: rgba(34,197,94,0.85); color: #fff; }
    .badge-error { background: rgba(239,68,68,0.8); color: #fff; }

    .live-result-panel {
        margin-top: var(--space-3);
        padding: var(--space-3);
        border-radius: 12px;
        background: var(--surface-1, #f9fafb);
        border: 1px solid var(--border, #e5e7eb);
        display: none;
    }
    .live-result-panel.show { display: block; }
    .result-score {
        font-size: 2.5rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: var(--space-2);
    }
    .result-score .fraction {
        font-size: 1.2rem;
        color: var(--text-muted, #6b7280);
        font-weight: 400;
    }
    .result-info {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: var(--space-2);
        text-align: center;
    }
    .result-info-item {
        padding: var(--space-2);
        background: var(--surface-2, #fff);
        border-radius: 8px;
        border: 1px solid var(--border, #e5e7eb);
    }
    .result-info-item .label {
        font-size: 0.75rem;
        color: var(--text-muted, #6b7280);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .result-info-item .value {
        font-size: 1.25rem;
        font-weight: 600;
        margin-top: 2px;
    }
    /* Fullscreen enter button */
    .btn-fullscreen {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 8px;
        background: var(--primary, #0f766e);
        color: #fff;
        font-size: 0.85rem;
        font-weight: 600;
        border: none;
        cursor: pointer;
    }
    .btn-fullscreen:hover { opacity: 0.9; }

    .btn-capture {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 4px solid #fff;
        background: rgba(255,255,255,0.3);
        cursor: pointer;
        z-index: 20;
        transition: all 0.2s;
        backdrop-filter: blur(4px);
    }
    .btn-capture:hover { background: rgba(255,255,255,0.5); }
    .btn-capture:active { transform: translateX(-50%) scale(0.9); }
    .live-container.is-fullscreen .btn-capture {
        bottom: 30px;
        width: 72px;
        height: 72px;
    }
    .btn-capture.scanning {
        border-color: #3b82f6;
        background: rgba(59,130,246,0.4);
        animation: pulse 1s infinite;
    }
    @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); }
        50% { box-shadow: 0 0 0 12px rgba(59,130,246,0); }
    }
    .btn-actions {
        display: flex;
        gap: var(--space-2);
        justify-content: center;
        margin-top: var(--space-3);
    }
    .live-answers {
        margin-top: var(--space-2);
        font-size: 0.85rem;
        line-height: 1.8;
    }
    .live-answers .q-correct { color: #16a34a; font-weight: 600; }
    .live-answers .q-wrong { color: #dc2626; font-weight: 600; }
    .live-answers .q-empty { color: #9ca3af; }

    .auto-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.85rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="live-container" :class="{ 'is-fullscreen': isFullscreen }" x-data="liveCamera()">
    <div class="live-header">
        <h1>Cham diem truc tiep</h1>
        <div class="live-controls">
            <select x-model="examId" class="form-select" style="max-width:220px; font-size:0.85rem;">
                <option value="">-- Khong co dap an --</option>
                {% for exam in exams %}
                <option value="{{ exam.id }}">{{ exam.name }}</option>
                {% endfor %}
            </select>
            <label class="auto-toggle">
                <input type="checkbox" x-model="autoMode">
                Tự động quét
            </label>
            <button class="btn-fullscreen" @click="enterFullscreen()">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 6V2h4M14 6V2h-4M2 10v4h4M14 10v4h-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Toàn màn hình
            </button>
        </div>
    </div>

    <!-- Camera viewport -->
    <div class="live-video-wrap">
        <!-- Fullscreen top bar (only visible in fullscreen) -->
        <div class="fs-topbar">
            <button class="fs-close" @click="exitFullscreen()">&times;</button>
            <select x-model="examId" style="max-width:180px;">
                <option value="">-- Khong dap an --</option>
                {% for exam in exams %}
                <option value="{{ exam.id }}">{{ exam.name }}</option>
                {% endfor %}
            </select>
            <label style="color:#fff; font-size:0.8rem; display:flex; align-items:center; gap:4px;">
                <input type="checkbox" x-model="autoMode"> Auto
            </label>
        </div>
        <video x-ref="video" autoplay playsinline muted></video>
        <canvas x-ref="overlay" class="live-overlay"></canvas>
        <!-- Corner detection status -->
        <div class="live-corner-status"
             x-show="!lastResult && cameraReady"
             :class="{
                 'corner-status-searching': cornersFound === 0,
                 'corner-status-partial': cornersFound > 0 && cornersFound < 4,
                 'corner-status-found': cornersFound === 4
             }"
             x-text="cornersFound === 4 ? (quadValid ? '✅ Phieu hop le — San sang cham!' : '⚠️ 4 goc — Sai vi tri') : (cornersFound > 0 ? cornersFound + '/4 goc...' : 'Dua phieu vao khung hinh')"
             x-transition></div>

        <div class="live-status">
            <span class="live-badge"
                  :class="{
                      'badge-idle': status === 'idle',
                      'badge-scanning': status === 'scanning',
                      'badge-success': status === 'success',
                      'badge-error': status === 'error'
                  }"
                  x-text="statusText"></span>
            <span class="live-badge badge-idle" x-show="fps > 0"
                  x-text="fps + ' FPS'"></span>
        </div>

        <button class="btn-capture"
                :class="{ scanning: status === 'scanning' }"
                @click="captureAndGrade()"
                :disabled="status === 'scanning' || !cameraReady">
        </button>
    </div>

    <!-- Result panel -->
    <div class="live-result-panel" :class="{ show: lastResult }">
        <div class="result-score" x-show="lastResult && lastResult.success">
            <span x-text="lastResult ? lastResult.score : ''"></span>
            <span class="fraction">/ <span x-text="lastResult ? lastResult.max_score : ''"></span></span>
        </div>
        <div class="result-info" x-show="lastResult && lastResult.success">
            <div class="result-info-item">
                <div class="label">SBD</div>
                <div class="value" x-text="lastResult ? lastResult.sbd : ''"></div>
            </div>
            <div class="result-info-item">
                <div class="label">Ma de</div>
                <div class="value" x-text="lastResult ? lastResult.made : ''"></div>
            </div>
            <div class="result-info-item">
                <div class="label">Phan I</div>
                <div class="value" x-text="lastResult && lastResult.scores ? lastResult.scores.part1 || 0 : 0"></div>
            </div>
            <div class="result-info-item">
                <div class="label">Phan II</div>
                <div class="value" x-text="lastResult && lastResult.scores ? lastResult.scores.part2 || 0 : 0"></div>
            </div>
        </div>
        <div x-show="lastResult && !lastResult.success"
             style="text-align:center; padding: var(--space-3);">
            <div style="font-size:2rem; margin-bottom:8px;">&#10060;</div>
            <p style="color: #ef4444; font-weight:600;" x-text="lastResult ? lastResult.error : ''"></p>
        </div>

        <!-- Part 1 answers grid -->
        <div class="live-answers" x-show="lastResult && lastResult.success && lastResult.part1">
            <strong>Dap an Phan I:</strong><br>
            <template x-for="q in 40" :key="q">
                <span style="display:inline-block; width:70px;"
                      :class="{
                          'q-correct': lastResult && lastResult.part1 && lastResult.part1[String(q)] && lastResult.part1[String(q)] !== '' && lastResult.part1[String(q)] !== 'X',
                          'q-empty': lastResult && lastResult.part1 && (!lastResult.part1[String(q)] || lastResult.part1[String(q)] === ''),
                          'q-wrong': lastResult && lastResult.part1 && lastResult.part1[String(q)] === 'X'
                      }">
                    <span x-text="'Q' + q + ':'"></span>
                    <span x-text="lastResult && lastResult.part1 ? (lastResult.part1[String(q)] || '-') : '-'"></span>
                </span>
            </template>
        </div>

        <div class="btn-actions">
            <button class="btn btn-outline-secondary btn-sm" @click="lastResult = null">
                Xoa ket qua
            </button>
            <button class="btn btn-primary btn-sm" @click="saveResult()"
                    x-show="lastResult && lastResult.success">
                Luu ket qua
            </button>
            <button class="btn btn-success btn-sm" @click="exportExcel()"
                    x-show="allResults.length > 0">
                Xuat Excel (<span x-text="allResults.length"></span> bai)
            </button>
        </div>
    </div>

    <!-- Hidden canvas for frame capture -->
    <canvas x-ref="capture" style="display:none;"></canvas>
</div>

<script>
function liveCamera() {
    return {
        cameraReady: false,
        status: 'idle',
        statusText: 'San sang',
        examId: '',
        autoMode: false,
        autoTimer: null,
        lastResult: null,
        allResults: [],
        fps: 0,
        cornersFound: 0,
        quadValid: false,
        isFullscreen: false,
        _lastTime: 0,
        _detectTimer: null,
        _detectedCorners: [],
        _cornerHistory: { TL: [], TR: [], BR: [], BL: [] },

        async init() {
            try {
                // Request portrait camera — ideal hints, camera gives best match
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1080 },
                        height: { ideal: 1920 },
                    },
                    audio: false
                });
                this.$refs.video.srcObject = stream;
                this.$refs.video.onloadedmetadata = () => {
                    this.cameraReady = true;
                    this.statusText = 'San sang — Nhan nut de cham';

                    // Adapt container aspect-ratio to actual video ratio
                    // This eliminates black bars AND prevents zoom
                    const vw = this.$refs.video.videoWidth;
                    const vh = this.$refs.video.videoHeight;
                    if (vw && vh) {
                        const wrap = this.$refs.video.closest('.live-video-wrap');
                        wrap.style.aspectRatio = vw + ' / ' + vh;
                        wrap.style.maxWidth = 'calc(85vh * ' + vw + ' / ' + vh + ')';
                    }

                    this.resizeOverlay();
                    this.startCornerDetection();
                    // Auto-enter fullscreen on mobile
                    if (window.innerWidth <= 1024) {
                        setTimeout(() => this.enterFullscreen(), 600);
                    }
                };
                // Auto mode watcher
                this.$watch('autoMode', (val) => {
                    if (val) this.startAuto();
                    else this.stopAuto();
                });
                // Sync state when browser exits fullscreen (ESC key)
                document.addEventListener('fullscreenchange', () => {
                    if (!document.fullscreenElement && this.isFullscreen) {
                        this.exitFullscreen();
                    }
                });
            } catch (e) {
                this.status = 'error';
                this.statusText = 'Khong the mo camera';
                console.error(e);
            }
        },

        resizeOverlay() {
            const video = this.$refs.video;
            const canvas = this.$refs.overlay;
            canvas.width = video.videoWidth || video.clientWidth;
            canvas.height = video.videoHeight || video.clientHeight;
        },

        enterFullscreen() {
            this.isFullscreen = true;
            // Hide navbar & sidebar
            document.querySelector('.top-navbar')?.style.setProperty('display', 'none', 'important');
            document.querySelector('.sidebar')?.style.setProperty('display', 'none', 'important');
            document.querySelector('.sidebar-backdrop')?.style.setProperty('display', 'none', 'important');
            // Request browser fullscreen
            const el = this.$el;
            if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            // Lock to portrait if available
            try { screen.orientation?.lock('portrait').catch(() => {}); } catch(e) {}
        },

        exitFullscreen() {
            this.isFullscreen = false;
            // Restore navbar & sidebar
            document.querySelector('.top-navbar')?.style.removeProperty('display');
            document.querySelector('.sidebar')?.style.removeProperty('display');
            document.querySelector('.sidebar-backdrop')?.style.removeProperty('display');
            // Exit browser fullscreen
            if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
            else if (document.webkitFullscreenElement) document.webkitExitFullscreen();
        },


        /* ─── Real-time corner marker detection ─── */
        startCornerDetection() {
            if (this._detectTimer) clearInterval(this._detectTimer);
            this._detectTimer = setInterval(() => {
                if (!this.cameraReady || this.status === 'scanning' || this.lastResult) return;
                this.detectCorners();
            }, 400);
        },

        detectCorners() {
            const video = this.$refs.video;
            const overlay = this.$refs.overlay;
            if (!video || !overlay || video.videoWidth === 0) return;

            // Capture full video frame (object-fit:contain = no crop)
            const cap = this.$refs.capture;
            const W = video.videoWidth;
            const H = video.videoHeight;
            cap.width = W;
            cap.height = H;
            const ctx = cap.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(video, 0, 0, W, H);

            // Resize overlay to match video display CSS bounds
            const vRect = video.getBoundingClientRect();
            overlay.width = vRect.width;
            overlay.height = vRect.height;
            
            // object-fit:contain — calculate where video is drawn inside the element
            const scale = Math.min(vRect.width / W, vRect.height / H);
            const drawW = W * scale;
            const drawH = H * scale;
            const offsetX = (vRect.width - drawW) / 2;
            const offsetY = (vRect.height - drawH) / 2;

            const visW = drawW;
            const visH = drawH;
            const visX = offsetX;
            const visY = offsetY;

            const marginX = visW * 0.08;
            const marginTop = visH * 0.16;
            const marginBot = visH * 0.16;
            const roiSizeW = visW * 0.12;
            const roiSizeH = visH * 0.12;

            const screenRegions = [
                { label: 'TL', cx: visX + marginX, cy: visY + marginTop },
                { label: 'TR', cx: visX + visW - marginX, cy: visY + marginTop },
                { label: 'BR', cx: visX + visW - marginX, cy: visY + visH - marginBot },
                { label: 'BL', cx: visX + marginX, cy: visY + visH - marginBot },
            ];

            const rawFound = [];
            for (const sReg of screenRegions) {
                // Map screen coordinate back to raw video coordinate
                const rawCx = (sReg.cx - offsetX) / scale;
                const rawCy = (sReg.cy - offsetY) / scale;
                const rawRw = roiSizeW / scale;
                const rawRh = roiSizeH / scale;

                const rawX = Math.round(rawCx - rawRw / 2);
                const rawY = Math.round(rawCy - rawRh / 2);

                const x1 = Math.max(0, rawX);
                const y1 = Math.max(0, rawY);
                const x2 = Math.min(W, rawX + rawRw);
                const y2 = Math.min(H, rawY + rawRh);

                const marker = this._findDarkSquare(ctx, x1, y1, x2 - x1, y2 - y1);
                
                const origX = marker ? x1 + marker.cx : 0;
                const origY = marker ? y1 + marker.cy : 0;

                rawFound.push({ 
                    label: sReg.label, 
                    detected: !!marker,
                    orig_x: origX,
                    orig_y: origY,
                    x: marker ? offsetX + origX * scale : 0,
                    y: marker ? offsetY + origY * scale : 0 
                });
            }

            // Temporal smoothing: require 2 out of last 3 frames
            const HISTORY_LEN = 3;
            const MIN_CONFIRM = 2;
            const found = [];
            for (const r of rawFound) {
                const hist = this._cornerHistory[r.label];
                hist.push(r.detected ? 1 : 0);
                if (hist.length > HISTORY_LEN) hist.shift();
                const hits = hist.reduce((a, b) => a + b, 0);
                if (hits >= MIN_CONFIRM) {
                    found.push({ x: r.x, y: r.y, label: r.label });
                }
            }

            this.cornersFound = found.length;
            this._detectedCorners = found;

            this.quadValid = false;
            if (found.length === 4) {
                this.quadValid = this._validateQuad(found);
                if (this.quadValid) {
                    if (!this._stableSince) this._stableSince = performance.now();
                } else {
                    this._stableSince = null;
                }
            } else {
                this._stableSince = null;
            }

            // Draw on overlay
            const oCtx = overlay.getContext('2d');
            oCtx.clearRect(0, 0, overlay.width, overlay.height);

            // Square size: ~2.5% of overlay short side × 7.0 (700%)
            const baseSize = Math.min(overlay.width, overlay.height) * 0.025;
            const squareSize = Math.round(baseSize * 7.0);

            // Draw squares at FIXED positions mapped from screen coordinates
            for (const sReg of screenRegions) {
                const detected = found.some(f => f.label === sReg.label);
                if (detected) {
                    const f = found.find(f => f.label === sReg.label);
                    const color = this.quadValid ? 'rgba(34,197,94,0.85)' : 'rgba(251,191,36,0.85)';
                    this._drawCornerSquare(oCtx, f.x, f.y, squareSize, color, true);
                } else {
                    this._drawCornerSquare(oCtx, sReg.cx, sReg.cy, squareSize, 'rgba(255,255,255,0.35)', false);
                }
            }

            // Draw connecting frame when 4 corners validated
            if (found.length === 4 && this.quadValid) {
                const tl = found.find(f => f.label === 'TL');
                const tr = found.find(f => f.label === 'TR');
                const br = found.find(f => f.label === 'BR');
                const bl = found.find(f => f.label === 'BL');
                oCtx.strokeStyle = 'rgba(34,197,94,0.6)';
                oCtx.lineWidth = 2;
                oCtx.setLineDash([8, 4]);
                oCtx.beginPath();
                oCtx.moveTo(tl.x, tl.y);
                oCtx.lineTo(tr.x, tr.y);
                oCtx.lineTo(br.x, br.y);
                oCtx.lineTo(bl.x, bl.y);
                oCtx.closePath();
                oCtx.stroke();
                oCtx.setLineDash([]);
            }
        },

        _validateQuad(corners) {
            // Check that 4 corners form a reasonable rectangle (~A4 aspect)
            const tl = corners.find(c => c.label === 'TL');
            const tr = corners.find(c => c.label === 'TR');
            const br = corners.find(c => c.label === 'BR');
            const bl = corners.find(c => c.label === 'BL');
            if (!tl || !tr || !br || !bl) return false;

            // Edge lengths
            const dist = (a, b) => Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
            const top = dist(tl, tr);
            const bottom = dist(bl, br);
            const left = dist(tl, bl);
            const right = dist(tr, br);

            // Top and bottom should be similar width (within 40%)
            if (Math.min(top, bottom) / Math.max(top, bottom) < 0.6) return false;
            // Left and right should be similar height (within 40%)
            if (Math.min(left, right) / Math.max(left, right) < 0.6) return false;

            // Aspect ratio: width/height should be ~0.5-0.9 (portrait A4 ≈ 0.707)
            const avgW = (top + bottom) / 2;
            const avgH = (left + right) / 2;
            const aspect = avgW / avgH;
            if (aspect < 0.35 || aspect > 1.2) return false;

            // Minimum size: quad should be at least 15% of overlay area
            const area = 0.5 * Math.abs(
                (tr.x - tl.x) * (bl.y - tl.y) - (bl.x - tl.x) * (tr.y - tl.y)
            ) + 0.5 * Math.abs(
                (tr.x - br.x) * (bl.y - br.y) - (bl.x - br.x) * (tr.y - br.y)
            );
            const overlayArea = overlay.width * overlay.height;
            if (area / overlayArea < 0.10) return false;

            return true;
        },

        _findDarkSquare(ctx, x, y, w, h) {
            if (w < 10 || h < 10) return null;
            const imgData = ctx.getImageData(x, y, w, h);
            const data = imgData.data;

            // Downsample to grid for fast blob detection
            const gridSize = 4;
            const cols = Math.floor(w / gridSize);
            const rows = Math.floor(h / gridSize);
            const grid = [];

            let totalGray = 0; let totalPixels = 0;
            for(let i = 0; i < data.length; i += 4) {
                totalGray += data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                totalPixels++;
            }
            const avgLuma = totalPixels > 0 ? totalGray / totalPixels : 128;
            const threshold = Math.max(40, avgLuma * 0.55);

            for (let gr = 0; gr < rows; gr++) {
                grid[gr] = [];
                for (let gc = 0; gc < cols; gc++) {
                    let sum = 0, count = 0;
                    for (let dy = 0; dy < gridSize; dy++) {
                        for (let dx = 0; dx < gridSize; dx++) {
                            const px = gc * gridSize + dx;
                            const py = gr * gridSize + dy;
                            if (px < w && py < h) {
                                const idx = (py * w + px) * 4;
                                const gray = data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114;
                                sum += gray; count++;
                            }
                        }
                    }
                    grid[gr][gc] = (count > 0 && sum / count < threshold) ? 1 : 0;
                }
            }

            // Find largest connected dark blob
            const visited = Array.from({length: rows}, () => Array(cols).fill(false));
            let bestBlob = null;
            let bestArea = 0;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === 1 && !visited[r][c]) {
                        // BFS
                        const queue = [{r, c}];
                        visited[r][c] = true;
                        let minR = r, maxR = r, minC = c, maxC = c, area = 0;
                        while (queue.length > 0) {
                            const {r: cr, c: cc} = queue.shift();
                            area++;
                            minR = Math.min(minR, cr); maxR = Math.max(maxR, cr);
                            minC = Math.min(minC, cc); maxC = Math.max(maxC, cc);
                            for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                                const nr = cr + dr, nc = cc + dc;
                                if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited[nr][nc] && grid[nr][nc] === 1) {
                                    visited[nr][nc] = true;
                                    queue.push({r: nr, c: nc});
                                }
                            }
                        }

                        const blobW = maxC - minC + 1;
                        const blobH = maxR - minR + 1;
                        const aspect = blobW / blobH;
                        const fill = area / (blobW * blobH);

                        // Filter: must be square, well-filled, and big enough
                        if (area >= 12 && aspect > 0.55 && aspect < 1.8 && fill > 0.6 && blobW >= 4 && blobH >= 4) {
                            if (area > bestArea) {
                                bestArea = area;
                                bestBlob = {
                                    cx: ((minC + maxC) / 2) * gridSize + gridSize / 2,
                                    cy: ((minR + maxR) / 2) * gridSize + gridSize / 2,
                                    area: area
                                };
                            }
                        }
                    }
                }
            }

            return bestBlob;
        },

        _drawCornerSquare(ctx, x, y, size, color, filled) {
            const half = size / 2;
            if (filled) {
                // Filled square with slight glow
                ctx.shadowColor = color;
                ctx.shadowBlur = 8;
                ctx.fillStyle = color;
                ctx.fillRect(x - half, y - half, size, size);
                ctx.shadowBlur = 0;
            } else {
                // Outline-only square (guide)
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 3]);
                ctx.strokeRect(x - half, y - half, size, size);
                ctx.setLineDash([]);
            }
        },


        startAuto() {
            this.stopAuto();
            this.autoTimer = setInterval(() => {
                if (this.status !== 'scanning' && !this.lastResult) {
                    if (this.quadValid && this._stableSince && (performance.now() - this._stableSince >= 300)) {
                        this.captureAndGrade();
                    }
                }
            }, 100); 
        },

        stopAuto() {
            if (this.autoTimer) {
                clearInterval(this.autoTimer);
                this.autoTimer = null;
            }
        },

        async captureAndGrade() {
            if (!this.cameraReady || this.status === 'scanning') return;

            this.status = 'scanning';
            this.statusText = 'Dang cham...';
            const startTime = performance.now();

            // Capture full video frame (object-fit:contain = no crop)
            const video = this.$refs.video;
            const canvas = this.$refs.capture;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.92);

            try {
                const formData = new FormData();
                formData.append('image_base64', dataUrl);
                if (this.examId) formData.append('exam_id', this.examId);
                
                if (this._detectedCorners && this._detectedCorners.length === 4) {
                    const sortedCorners = ['TL', 'TR', 'BR', 'BL'].map(l => {
                        const pt = this._detectedCorners.find(c => c.label === l);
                        return pt ? [pt.orig_x, pt.orig_y] : null;
                    });
                    if (!sortedCorners.includes(null)) {
                        formData.append('corners', JSON.stringify(sortedCorners));
                    }
                }

                const resp = await fetch('{% url "grading:grade_frame" %}', {
                    method: 'POST',
                    body: formData,
                });
                const data = await resp.json();

                const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
                this.fps = Math.round(1000 / (performance.now() - startTime));

                if (data.success) {
                    this.status = 'success';
                    this.statusText = `Diem: ${data.score}/${data.max_score} (${elapsed}s)`;
                    this.lastResult = data;
                } else {
                    this.status = 'error';
                    this.statusText = data.error || 'Khong nhan dien duoc';
                    this.lastResult = data;
                }
            } catch (e) {
                this.status = 'error';
                this.statusText = 'Loi ket noi';
                console.error(e);
            }

            // Reset status after delay (if not auto)
            if (!this.autoMode) {
                setTimeout(() => {
                    if (this.status !== 'scanning') {
                        this.status = 'idle';
                        this.statusText = 'San sang';
                    }
                }, 5000);
            }
        },

        saveResult() {
            if (this.lastResult && this.lastResult.success) {
                // Check duplicate SBD
                const exists = this.allResults.find(r => r.sbd === this.lastResult.sbd && r.made === this.lastResult.made);
                if (exists) {
                    if (!confirm(`SBD ${this.lastResult.sbd} da ton tai. Ghi de?`)) return;
                    this.allResults = this.allResults.filter(r => !(r.sbd === this.lastResult.sbd && r.made === this.lastResult.made));
                }
                this.allResults.push({...this.lastResult, timestamp: new Date().toISOString()});
                this.statusText = `Da luu! (${this.allResults.length} bai)`;
            }
        },

        exportExcel() {
            if (this.allResults.length === 0) return;

            // Build CSV (Excel-compatible)
            let csv = '\uFEFF'; // BOM for UTF-8
            csv += 'STT,SBD,Ma de,Diem,Diem toi da,Phan I,Phan II,Phan III,Thoi gian\n';
            this.allResults.forEach((r, i) => {
                csv += `${i+1},${r.sbd || ''},${r.made || ''},${r.score || 0},${r.max_score || 0},`;
                csv += `${r.scores?.part1 || 0},${r.scores?.part2 || 0},${r.scores?.part3 || 0},`;
                csv += `${r.timestamp || ''}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ket_qua_cham_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        },

        destroy() {
            this.stopAuto();
            if (this._detectTimer) clearInterval(this._detectTimer);
            const video = this.$refs.video;
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }
        }
    };
}
</script>
