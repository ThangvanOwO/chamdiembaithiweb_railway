<!-- Top Navigation Bar -->
<header class="top-navbar">
    <div class="navbar-left">
        <!-- Mobile Menu Button -->
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="Mở menu">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M4 6h12M4 10h12M4 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
        <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
    </div>
    <div class="navbar-right">
        <!-- Dark Mode Toggle -->
        <button onclick="toggleTheme()" 
                class="btn btn-icon btn-secondary btn-sm" 
                data-tooltip="Chế độ sáng/tối"
                aria-label="Chuyển giao diện sáng/tối">
            <svg id="theme-toggle-icon" width="18" height="18" viewBox="0 0 20 20" fill="none">
                <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>

        <!-- Quick Upload Button -->
        <a href="{% url 'grading:upload' %}" class="btn btn-primary btn-sm">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Chấm bài mới</span>
        </a>

        <!-- User Dropdown -->
        <div class="dropdown" x-data="{ open: false }">
            <button @click="open = !open" class="dropdown-trigger" aria-label="Menu tài khoản">
                <div class="avatar avatar-sm">
                    {{ user.first_name|default:user.email|truncatechars:1|upper }}
                </div>
            </button>
            <div class="dropdown-menu scale-in" x-show="open" @click.away="open = false" x-transition x-cloak>
                <div class="dropdown-header">
                    <span class="dropdown-user-name">{{ user.get_full_name|default:user.email }}</span>
                    <span class="dropdown-user-email">{{ user.email }}</span>
                </div>
                <div class="dropdown-divider"></div>
                <a href="{% url 'accounts:profile' %}" class="dropdown-item">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M2 15c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    Hồ sơ
                </a>
                <form method="post" action="{% url 'accounts:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="dropdown-item dropdown-item-danger">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M6 2H4a2 2 0 00-2 2v8a2 2 0 002 2h2M10 12l4-4-4-4M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Đăng xuất
                    </button>
                </form>
            </div>
        </div>
    </div>
</header>
