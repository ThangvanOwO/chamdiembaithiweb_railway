{% load static %}
<!-- Sidebar Navigation -->
<aside class="sidebar" :class="{ 'collapsed': !sidebarOpen }" x-cloak>
    <!-- Logo -->
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <img src="{% static 'img/gradeflow_logo.png' %}" alt="GradeFlow" width="28" height="28" style="border-radius: 6px;">
            </div>
            <span class="logo-text" x-show="sidebarOpen" x-transition>GradeFlow</span>
        </div>
        <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen" aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M4 6h12M4 10h12M4 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <!-- Navigation Links -->
    <nav class="sidebar-nav">
        <div class="nav-section">
            <span class="nav-section-label" x-show="sidebarOpen" x-transition>Tổng quan</span>
            <a href="{% url 'dashboard:index' %}" class="nav-item {% if request.resolver_match.url_name == 'index' and request.resolver_match.app_name == 'dashboard' %}active{% endif %}">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <rect x="2" y="2" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="11" y="2" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="2" y="11" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="11" y="11" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                <span x-show="sidebarOpen" x-transition>Dashboard</span>
            </a>
        </div>

        <div class="nav-section">
            <span class="nav-section-label" x-show="sidebarOpen" x-transition>Chấm điểm</span>
            <a href="{% url 'grading:upload' %}" class="nav-item {% if request.resolver_match.url_name == 'upload' %}active{% endif %}">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M10 3v10M6 7l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M3 13v2a2 2 0 002 2h10a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span x-show="sidebarOpen" x-transition>Upload & Chấm</span>
            </a>
            <a href="{% url 'grading:exams' %}" class="nav-item {% if request.resolver_match.url_name == 'exams' %}active{% endif %}">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M4 3h12a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M7 7h6M7 10h6M7 13h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span x-show="sidebarOpen" x-transition>Bài thi</span>
            </a>
        </div>

        <div class="nav-section">
            <span class="nav-section-label" x-show="sidebarOpen" x-transition>Dữ liệu</span>
            <a href="{% url 'dashboard:history' %}" class="nav-item {% if request.resolver_match.url_name == 'history' %}active{% endif %}">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M10 6v4l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span x-show="sidebarOpen" x-transition>Lịch sử</span>
            </a>
        </div>
    </nav>

    <!-- User Info (Bottom) -->
    <div class="sidebar-footer">
        <a href="{% url 'accounts:profile' %}" class="user-card">
            <div class="user-avatar">
                {{ user.first_name|default:user.email|truncatechars:1|upper }}
            </div>
            <div class="user-info" x-show="sidebarOpen" x-transition>
                <span class="user-name">{{ user.get_full_name|default:user.email }}</span>
                <span class="user-role">Giáo viên</span>
            </div>
        </a>
    </div>
</aside>
