name: gradeflow_app
description: GradeFlow — Chấm điểm trắc nghiệm tự động bằng camera
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lucide_icons: ^0.257.0

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2
  http_parser: ^4.0.2

  # Document Scanner (Google ML Kit)
  google_mlkit_document_scanner: ^0.3.0

  # Image handling
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  path_provider: ^2.1.4

  # File picker (for Excel import)
  file_picker: ^8.0.0+1

  # Local storage
  shared_preferences: ^2.3.2

  # Utils
  intl: ^0.19.0
  cached_network_image: ^3.4.1

  # Tutorial / Onboarding
  introduction_screen: ^3.1.14
  tutorial_coach_mark: ^1.2.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png

flutter:
  uses-material-design: true

  # Fonts loaded via google_fonts package (no local .ttf needed)
  # If you want offline fonts, download from fonts.google.com
  # and uncomment the fonts section below.
